AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31

Globals:
  Function:
    Runtime: dotnet8
    MemorySize: 256
    Timeout: 10

Resources:
  EcommerceTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: ecommerce
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  GetProfileFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: get-profile
      Runtime: python3.13
      Handler: get_profile.lambda_handler
      CodeUri: src/python/
      MemorySize: 256
      Timeout: 10
      Environment:
        Variables:
          TABLE_NAME: ecommerce
      Policies:
        - DynamoDBCrudPolicy:
            TableName: ecommerce
      Events:
        GetProfileApi:
          Type: Api
          Properties:
            Path: /api/v1/profile
            Method: get 

  CreateProductFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: create-product
      Runtime: dotnet8
      Handler: Ecommerce.CreateProduct::Ecommerce.CreateProduct.Function::FunctionHandler
      CodeUri: src/csharp/Ecommerce.CreateProduct/
      MemorySize: 256
      Timeout: 10
      Environment:
        Variables:
          TABLE_NAME: ecommerce
      Policies:
        - DynamoDBCrudPolicy:
            TableName: ecommerce
      Events:
        CreateProductApi:
          Type: Api
          Properties:
            Path: /api/v1/products
            Method: post
        
  UpdateProductFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: update-product
      Runtime: dotnet8
      Handler: Ecommerce.UpdateProduct::Ecommerce.UpdateProduct.Function::FunctionHandler
      CodeUri: src/csharp/Ecommerce.UpdateProduct/
      MemorySize: 256
      Timeout: 10
      Environment:
        Variables:
          TABLE_NAME: ecommerce
      Policies:
        - DynamoDBCrudPolicy:
            TableName: ecommerce
      Events:
        UpdateProductApi:
          Type: Api
          Properties:
            Path: /api/v1/products/{id}
            Method: put

