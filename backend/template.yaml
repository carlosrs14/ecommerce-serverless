AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31

Globals:
  Function:
    Runtime: python3.12
    MemorySize: 256
    Timeout: 10
    Environment:
      Variables:
        TABLE_NAME: ecommerce
        INDEX_NAME: GSI1

Resources:
  EcommerceTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: ecommerce
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  Cache:
    Type: AWS::ElastiCache::ServerlessCache
    Properties:
      ServerlessCacheName: ecommerce-cache
      Engine: redis
      DailySnapshotTime: "00:00"
      Description: Cache para perfiles (cache-aside)

  SwaggerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: swagger-ui
      Handler: swagger.lambda_handler
      CodeUri: src/python/
      Events:
        SwaggerHtml:
          Type: Api
          Properties:
            Path: /docs
            Method: get
        SwaggerYaml:
          Type: Api
          Properties:
            Path: /openapi.yaml
            Method: get

  GetProfileFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: get-profile
      Handler: get_profile.lambda_handler
      CodeUri: src/python/
      Environment:
        Variables:
          CACHE_ENDPOINT: !GetAtt Cache.Endpoint.Address
      Policies:
        - DynamoDBCrudPolicy:
            TableName: ecommerce
      Events:
        GetProfileApi:
          Type: Api
          Properties:
            Path: /api/v1/profile
            Method: get 

  ListProductsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: list-products
      Handler: list_products.lambda_handler
      CodeUri: src/python/
      Policies: [DynamoDBCrudPolicy: {TableName: ecommerce}]
      Events:
        ListProductsApi:
          Type: Api
          Properties: {Path: /api/v1/products, Method: get}

  GetProductDetailsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: get-product-details
      Handler: get_product.lambda_handler
      CodeUri: src/python/
      Policies: [DynamoDBCrudPolicy: {TableName: ecommerce}]
      Events:
        GetProductApi:
          Type: Api
          Properties: {Path: /api/v1/products/{id}, Method: get}
  
  DeleteProductFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: delete-product
      Handler: delete_product.lambda_handler
      CodeUri: src/python/
      Policies: [DynamoDBCrudPolicy: {TableName: ecommerce}]
      Events:
        DeleteProductApi:
          Type: Api
          Properties: {Path: /api/v1/products/{id}, Method: delete}

  CreateOfferFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: create-offer
      Handler: create_offer.lambda_handler
      CodeUri: src/python/
      Policies: [DynamoDBCrudPolicy: {TableName: ecommerce}]
      Events:
        CreateOfferApi:
          Type: Api
          Properties: {Path: /api/v1/products/{id}/offers, Method: post}

  UpdateOfferFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: update-offer
      Handler: update_offer.lambda_handler
      CodeUri: src/python/
      Policies: [DynamoDBCrudPolicy: {TableName: ecommerce}]
      Events:
        UpdateOfferApi:
          Type: Api
          Properties: {Path: /api/v1/products/{id}/offers/{sellerId}, Method: put}

  GetSellerOffersFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: get-seller-offers
      Handler: get_seller_offers.lambda_handler
      CodeUri: src/python/
      Policies: [DynamoDBCrudPolicy: {TableName: ecommerce}]
      Events:
        GetSellerOffersApi:
          Type: Api
          Properties: {Path: /api/v1/sellers/{id}/offers, Method: get}

  CreateProductFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: create-product
      Runtime: dotnet8
      Handler: Ecommerce.CreateProduct::Ecommerce.CreateProduct.Function::FunctionHandler
      CodeUri: src/csharp/Ecommerce.CreateProduct/
      Policies: [DynamoDBCrudPolicy: {TableName: ecommerce}]
      Events:
        CreateProductApi:
          Type: Api
          Properties: {Path: /api/v1/products, Method: post}
        
  UpdateProductFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: update-product
      Runtime: dotnet8
      Handler: Ecommerce.UpdateProduct::Ecommerce.UpdateProduct.Function::FunctionHandler
      CodeUri: src/csharp/Ecommerce.UpdateProduct/
      Policies: [DynamoDBCrudPolicy: {TableName: ecommerce}]
      Events:
        UpdateProductApi:
          Type: Api
          Properties: {Path: /api/v1/products/{id}, Method: put}

  GetOrdersFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: get-orders
      Runtime: provided.al2
      Handler: main
      CodeUri: ./src/go/functions/get-orders/
      Timeout: 30
      Policies: [DynamoDBCrudPolicy: {TableName: ecommerce}]
      Events:
        GetOrdersApi:
          Type: Api
          Properties: {Path: /api/v1/users/{email}/orders, Method: get}

Outputs:
  SwaggerUI:
    Description: URL para la documentación Swagger
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/docs"
  LocalSwaggerUI:
    Description: URL para Swagger en local
    Value: "http://localhost:3000/docs"
